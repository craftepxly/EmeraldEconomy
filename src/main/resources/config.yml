# ========================================
# Emerald Economy Configuration
# ========================================

messages_locale: "messages_eng"

currency:
  name: "Dollar"
  symbol: "$"

prices:
  buy: 10.0
  sell: 9.5

dynamic_pricing:
  enabled: true
  window_seconds: 300
  update_interval: 5
  min_price: 1.0
  max_price: 1000.0
  demand_sensitivity: 0.02
  supply_sensitivity: 0.02
  depletion_rate: 0.0001
  depletion_recovery_seconds: 3600
  max_impact_per_transaction: 100
  transaction_tax_rate: 0.05

tax_groups:
  citizens:
    transaction_tax_rate: 0.05
  vip:
    transaction_tax_rate: 0.03
  vip+:
    transaction_tax_rate: 0.01

transaction:
  log_file: "transactions.log"
  enable_console_log: true
  cooldown: 3
  rate_limit:
    enabled: true
    max_per_minute: 20

gui:
  menu_file: "menu.yml"
  update_interval: 20

placeholder:
  register: true

storage:
  type: SQLITE
  mysql:
    host: localhost
    port: 3306
    database: EmeraldEconomy
    username: root
    password: password
    pool-size: 10
    properties: "useSSL=false&autoReconnect=true&allowPublicKeyRetrieval=true"
    timeout: 30000
    max-lifetime: 1800000
  sqlite:
    filename: emeraldeconomy.db
    wal-mode: true
  async:
    enabled: true
    thread-pool-size: 4

security:
  strict_emerald_check: true

debug: false
